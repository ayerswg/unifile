<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unifile — Unifile</title>
  <meta name="description" content="A universal file format for ideas" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <button id="home-theme-toggle" aria-label="Toggle theme"></button>

<div id="home-wrap">
  <div id="home-wordmark">unifile.app</div>

  <div id="home-prompt-row">
    <span id="home-prompt-glyph">&gt;</span>
    <div id="home-search-wrap">
      <input
        id="home-search-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="type to navigate..."
      />
    </div>
  </div>

  <div id="home-hint">↑↓ to move &nbsp;·&nbsp; ↵ to go &nbsp;·&nbsp; esc to clear</div>
</div>

  <script src="/assets/js/search.js"></script>
</body>
</html>
