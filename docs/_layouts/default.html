<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}" />
  <!-- Default to light mode before paint to avoid a dark flash. -->
  <script>(function(){var t=localStorage.getItem('uf-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {{ content }}
  <!-- Expose the Jekyll baseurl so the static search script can build correct
       links regardless of where the site is hosted (custom domain or sub-path). -->
  <script>window.SITE_BASEURL = {{ site.baseurl | jsonify }};</script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
